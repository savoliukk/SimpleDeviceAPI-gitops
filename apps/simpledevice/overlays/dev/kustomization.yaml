apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: simpledevice-dev

resources:
  - ../../base
  - ingress.yaml
  - externalsecret.yaml

configMapGenerator:
  - name: simpledevice-api-config
    literals:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - ASPNETCORE_ENVIRONMENT=Development

generatorOptions:
  disableNameSuffixHash: true

images:
  - name: simpledevice-api
    newName: ghcr.io/savoliukk/simpledevice-api
    newTag: 0b237f9
  - name: simpledevice-migrator
    newName: ghcr.io/savoliukk/simpledevice-migrator
    newTag: 0b237f9
